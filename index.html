<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Sports - Real Live Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    <style>
        .live-dot { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-slate-950 text-gray-100 font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="bg-amber-500 text-slate-950 p-2 rounded-xl font-black text-xl tracking-wider">
                <i class="fa-solid fa-gem mr-1"></i>CRYSTAL LIVE
            </div>
            <div class="flex items-center space-x-2 bg-red-600/20 text-red-500 px-3 py-1.5 rounded-full text-xs font-bold">
                <span class="w-2 h-2 rounded-full bg-red-500 live-dot mr-2"></span>সরাসরি সম্প্রচার
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-4">
            <div class="bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-2xl">
                <div class="aspect-video w-full bg-black">
                    <video id="live-stream-player" class="video-js vjs-theme-city w-full h-full" controls autoplay preload="auto">
                        <source src="https://raw.githubusercontent.com/Freetv01/Tv/main/T-Sports.m3u8" type="application/x-mpegURL">
                    </video>
                </div>
                <div class="p-4 bg-slate-900">
                    <span class="text-xs font-semibold text-amber-500 uppercase">বর্তমানে চলছে</span>
                    <h2 class="text-xl font-bold text-white" id="stream-title">T-Sports Live HD</h2>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 h-[450px] flex flex-col">
                <h3 class="font-bold text-base text-slate-200 mb-4 pb-2 border-b border-slate-800">
                    <i class="fa-solid fa-satellite-dish text-amber-500 mr-2"></i> লাইভ স্পোর্টস সার্ভার
                </h3>

                <div class="space-y-2.5 overflow-y-auto flex-1">
                    
                    <button onclick="changeLiveStream('https://raw.githubusercontent.com/Freetv01/Tv/main/T-Sports.m3u8', 'T-Sports Live HD')" 
                        class="w-full text-left bg-slate-950 hover:bg-slate-800 border border-slate-800 p-3 rounded-xl flex items-center justify-between group transition">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-amber-500/10 text-amber-500 rounded-lg flex items-center justify-center font-bold">
                                <i class="fa-solid fa-play"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-gray-200">T-Sports (Server 1)</h4>
                                <p class="text-xs text-gray-500">বাংলাদেশী আসল লাইভ লিংক</p>
                            </div>
                        </div>
                        <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded font-medium">LIVE</span>
                    </button>

                    <button onclick="changeLiveStream('https://bdiptv.stream:8443/tsports/index.m3u8', 'T-Sports Alternative')" 
                        class="w-full text-left bg-slate-950 hover:bg-slate-800 border border-slate-800 p-3 rounded-xl flex items-center justify-between group transition">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-500/10 text-blue-500 rounded-lg flex items-center justify-center font-bold">
                                <i class="fa-solid fa-play"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-gray-200">T-Sports (Server 2)</h4>
                                <p class="text-xs text-gray-500">বিকল্প বিডি আইপিটিভি সোর্স</p>
                            </div>
                        </div>
                        <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded font-medium">LIVE</span>
                    </button>

                    <button onclick="changeLiveStream('https://raw.githubusercontent.com/Freetv01/Tv/main/Gtv.m3u8', 'GTV Live')" 
                        class="w-full text-left bg-slate-950 hover:bg-slate-800 border border-slate-800 p-3 rounded-xl flex items-center justify-between group transition">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-green-500/10 text-green-500 rounded-lg flex items-center justify-center font-bold">
                                <i class="fa-solid fa-play"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-gray-200">GTV Live (ক্রিকেট)</h4>
                                <p class="text-xs text-gray-500">জিটিভি লাইভ ম্যাচ সোর্স</p>
                            </div>
                        </div>
                        <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded font-medium">LIVE</span>
                    </button>

                </div>
            </div>
        </div>
    </main>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script>
        var player = videojs('live-stream-player', { fluid: true });

        function changeLiveStream(url, title) {
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();
            document.getElementById('stream-title').innerText = title;
        }
    </script>
</body>
</html>
